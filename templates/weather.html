<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🌤 天氣即時查詢</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>🌤 天氣即時查詢</h2>
        <form method="POST" class="search-form">
            <input type="text" name="city" placeholder="請輸入城市英文（如: Taipei, Tokyo）" required>
            <button type="submit">查詢天氣</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if weather %}
            <div class="card weather-card">
                <h3>城市：{{ weather.city }}</h3>
                <img src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png" alt="weather-icon">
                <p class="temp">目前溫度：{{ weather.temp }} °C</p>
                <p>環境濕度：{{ weather.humidity }} %</p>
                <p>天氣狀況：{{ weather.desc }}</p>
            </div>
        {% endif %}

        <br>
        <a href="/" class="back-link">返回首頁</a>
    </div>
</body>
</html>
