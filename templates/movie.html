<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🎬 熱門電影推薦</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>🎬 熱門電影推薦</h2>
        <form method="POST" class="search-form">
            <input type="text" name="keyword" placeholder="請輸入電影關鍵字" required>
            <button type="submit">搜尋電影</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <div class="movie-grid">
            {% for movie in movies %}
                <div class="card movie-card">
                    {% if movie.poster %}
                        <img src="{{ movie.poster }}" alt="Poster" class="movie-poster">
                    {% endif %}
                    <div class="movie-info">
                        <h3>{{ movie.title }}</h3>
                        <span class="date">上映日期：{{ movie.release_date }}</span>
                        <p class="overview">{{ movie.overview }}</p>
                    </div>
                </div>
            {% endfor %}
        </div>

        <br>
        <a href="/" class="back-link">返回首頁</a>
    </div>
</body>
</html>
