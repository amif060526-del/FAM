<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask a Question</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }
        section {
            margin: 20px;
        }
        .form-box {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>提問</h1>
    </header>
    <section>
        <div class="form-box">
            <form action="/ask" method="post">
                <label for="dict_type">選擇語言：</label>
                <select name="dict_type" id="dict_type" onchange="this.form.submit()">
                    <option value="en" {% if dict_type == 'en' %}selected{% endif %}>中英字典</option>
                    <option value="ko" {% if dict_type == 'ko' %}selected{% endif %}>中韓字典</option>
                </select>
                <br><br>
                <p><small>來源：{{ source }}</small></p>
                <input type="submit" value="送出查詢">
                <input type="button" value="回首頁" onclick="window.location.href='/'">
            </form>
        </div>
    </section>
</body>
</html>
